name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: lazyfinder-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: lazyfinder-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            name: lazyfinder-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: lazyfinder-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          profile: minimal
          override: true

      - name: Install UPX
        if: runner.os != 'macOS'
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Update Cargo.toml version
        run: |
          # 提取 tag 名字 (例如把 refs/tags/v0.2.5 变成 0.2.5)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Updating Cargo.toml version to $VERSION"
          # 用 sed 替换 Cargo.toml 中的版本号
          sed -i.bak -e "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
        shell: bash

      - name: Build and Compress (English)
        run: |
          cargo build --release --target ${{ matrix.target }}
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv target/${{ matrix.target }}/release/lazyfinder.exe target/${{ matrix.target }}/release/${{ matrix.name }}-en.exe
            upx --best --lzma target/${{ matrix.target }}/release/${{ matrix.name }}-en.exe || true
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mv target/${{ matrix.target }}/release/lazyfinder target/${{ matrix.target }}/release/${{ matrix.name }}-en
            upx --best --lzma target/${{ matrix.target }}/release/${{ matrix.name }}-en || true
          else
            # macOS 不使用 UPX
            mv target/${{ matrix.target }}/release/lazyfinder target/${{ matrix.target }}/release/${{ matrix.name }}-en
          fi
        shell: bash

      - name: Build and Compress (Chinese)
        run: |
          cargo clean
          cargo build --release --target ${{ matrix.target }} --no-default-features --features i18n-zh
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv target/${{ matrix.target }}/release/lazyfinder.exe target/${{ matrix.target }}/release/${{ matrix.name }}-zh.exe
            upx --best --lzma target/${{ matrix.target }}/release/${{ matrix.name }}-zh.exe || true
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mv target/${{ matrix.target }}/release/lazyfinder target/${{ matrix.target }}/release/${{ matrix.name }}-zh
            upx --best --lzma target/${{ matrix.target }}/release/${{ matrix.name }}-zh || true
          else
            # macOS 不使用 UPX
            mv target/${{ matrix.target }}/release/lazyfinder target/${{ matrix.target }}/release/${{ matrix.name }}-zh
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-binaries
          path: |
            target/${{ matrix.target }}/release/${{ matrix.name }}-en*
            target/${{ matrix.target }}/release/${{ matrix.name }}-zh*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
